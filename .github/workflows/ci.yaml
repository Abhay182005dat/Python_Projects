name: CI Pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v3
        with :
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: install dependencies
        working-directory: ./mlops-mini-project
        run: |
          pip install -r requirements.txt

      - name: run pipeline
        env:
          MLOPSMINI: ${{ secrets.MLOPSMINI }}
        working-directory: ./mlops-mini-project
        run: |
          dvc repro