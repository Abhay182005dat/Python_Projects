name: CI Pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v3
        with :
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: install dependencies
        working-directory: ./mlops-mini-project
        run: |
          pip install -r requirements.txt

      - name: run pipeline
        env:
          MLOPSMINI: ${{ secrets.MLOPSMINI }}
        working-directory: ./mlops-mini-project
        run: |
          dvc repro

      - name: run tests
        env:
          MLOPSMINI: ${{ secrets.MLOPSMINI }}
          PYTHONPATH: flask_app
        working-directory: ./mlops-mini-project
        run: |
          python -m unittest tests/test_model.py

      - name: promote model to production
        if: success()
        env:
          MLOPSMINI: ${{ secrets.MLOPSMINI }}
        working-directory: ./mlops-mini-project
        run: python scripts/promote_model.py

      - name: Run Flask app tests
        if : success()
        env:
          MLOPSMINI: ${{ secrets.MLOPSMINI }}
          PYTHONPATH: flask_app
        working-directory: ./mlops-mini-project
        run: python -m unittest tests/test_flask.py

      - name: Log in to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        if: success()
        working-directory: ./mlops-mini-project
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/emotion2:latest .

      - name: Push Docker image to Docker Hub
        if: success()
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/emotion2:latest

      - name: Deploy to EC2 
        if: success()
        uses: appleboy/ssh-action@v0.1.5
        with: 
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull ${{ secrets.DOCKER_USERNAME }}/emotion2:latest
              docker stop my-app || true
              docker rm my-app || true
              docker run -p 80:5000 --name my-app \
              -e MLOPSMINI=${{ secrets.MLOPSMINI }} \ 
              ${{ secrets.DOCKER_USERNAME }}/emotion2:latest